<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QS Candidate Academy</title>
    <meta name="description" content="QS Candidate Academy" />
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
      }
      .card {
        width: min(720px, 92vw);
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,.35);
      }
      h1 { margin-top: 0; color: #38bdf8; }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>QS Candidate Academy</h1>
      <p>This is the initial deployed site scaffold.</p>
      <p>It can be replaced with your production app after onboarding.</p>
      <ul>
        <li>GitHub repo: connect this folder to your remote and push</li>
        <li>Vercel: deploy directly from this repository</li>
      </ul>
      <p><a href="https://vercel.com">Deploy on Vercel</a></p>
    </main>
  </body>
</html>
